<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottie 320x600 Ad</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            background: transparent;
        }

        /* Full-screen animation container with no frame or centering */
        #ad-container.banner {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            margin: 0;
            position: fixed;
            inset: 0;
            border: none;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: transparent;
            display: block;
            animation: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Lottie fills the card */
        #ad-lottie {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
        }

        /* (in-ad close button removed when demo modal is used) */

        /* CTA button — clear, large touch target */
        .ad-cta {
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 12px;
            height: 44px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg,#ff6b6b,#ff8e53);
            color: white;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 6px 18px rgba(255,110,110,0.24);
            cursor: pointer;
            z-index: 30;
        }
        .ad-cta:active{ transform: translateY(1px); }

        /* Accessibility helpers */
        .visually-hidden{position:absolute!important;height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px);white-space:nowrap}

        @keyframes popIn{from{transform:translateY(12px) scale(.98);opacity:0}to{transform:none;opacity:1}}
        @media (max-width:360px){ #ad-container.banner{width:320px; height:568px} }

                /* When embedded in a demo iframe, hide the outer controls to avoid duplicates */
                .embedded .ad-close,
                .embedded .ad-cta {
                    display: none !important;
                }
    </style>

    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

        <!-- Local fallback for offline editing -->
        <script>
            if (!window.customElements || !window.customElements.get('lottie-player')) {
                var s = document.createElement('script');
                s.src = './player.js';
                document.head.appendChild(s);
            }
        </script>

    <script>
        var clickTag = "https://www.google.com";
    </script>

</head>

<body>

    <div id="ad-container" class="banner" role="dialog" aria-label="Advertisement" aria-describedby="ad-desc">
        <!-- in-ad close removed; demo modal provides close control -->

        <lottie-player id="ad-lottie" src="./data4.json" background="transparent" speed="1" loop autoplay aria-hidden="true">
        </lottie-player>

        <div id="ad-desc" class="visually-hidden">Promotional content. Click button to visit advertiser.</div>

        <!-- <button id="clickCta" class="ad-cta">Learn more</button> -->

    </div>

</body>

        <script>
            (function(){
                fetch('./data2.json').then(function(res){
                    if(!res.ok) throw new Error('HTTP '+res.status);
                    return res.json();
                }).then(function(json){
                    console.log('data2.json loaded OK');
                }).catch(function(err){
                    console.error('Failed to load data1.json:', err);
                    var msg=document.createElement('div');
                    msg.style.cssText='position:fixed;left:0;top:0;background:#ffdb57;color:#000;padding:8px;z-index:99999;font-family:Arial,sans-serif';
                    msg.textContent='Error loading data1.json — serve the folder over HTTP (e.g. `python -m http.server`). See console for details.';
                    document.body.appendChild(msg);
                });
            })();
        </script>

        <script>
            // If this page is loaded inside an iframe, mark it to hide its own controls
            try{
                if (window.self !== window.top) document.documentElement.classList.add('embedded');
            }catch(e){ /* cross-origin access might throw; ignore */ }
        </script>

</html>

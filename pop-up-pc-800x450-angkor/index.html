<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="ad.size" content="width=360,height=640">
  <title>HTML5 Ad</title>
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; background:transparent; }
    #ad-container { position:relative; width:100%; height:100%; overflow:hidden; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    #ad-lottie { display:block; width:100%; height:100%; background:transparent; pointer-events:none; }
  </style>
  <script>
    var clickTag = "https://carlsbergstore.my.canva.site/angkor-together-as-fan?fbclid=IwY2xjawS5p7xleHRuA2FlbQIxMABicmlkETFyR1RYVVZvaUd1RDFtdkxBc3J0YwZhcHBfaWQQMjIyMDM5MTc4ODIwMDg5MgABHpci3XjBt7PE6mmbmLYuZ26Q4C4lty_EmfUcVsfGdX-EKZNz_XTp_slNdjns_aem_gOohcNr0oEliIwgAR92LsA";
  </script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script>
    if (!window.customElements || !window.customElements.get('lottie-player')) {
      var fallback = document.createElement('script');
      fallback.src = './player.js';
      document.head.appendChild(fallback);
    }
  </script>
</head>
<body>
  <div id="ad-container" role="link" aria-label="Open advertisement" tabindex="0">
    <lottie-player id="ad-lottie" src="./data.json" background="transparent" speed="1" autoplay aria-hidden="true"></lottie-player>
  </div>
  <script>
    (function () {
      'use strict';
      var ad = document.getElementById('ad-container');
      function openLandingPage() { window.open(window.clickTag, '_blank', 'noopener,noreferrer'); }
      ad.addEventListener('click', openLandingPage);
      ad.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openLandingPage();
        }
      });
    })();
  </script>
</body>
</html>
